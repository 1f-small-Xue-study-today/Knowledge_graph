goals:
  - master advanced motor control and estimation, and Gimbal control algorithms, with a focus on practical implementation on the HC32F460 platform
  - integrate AI agents effectively into development workflow
  - develop Planning (minco/optimization) based algorithms, for robot path and motion planning, mainly focus on Mobile robot

metadata:
  last_reviewed: 2026-07-04
  review_notes:
    - added starter numerical optimization topic and basic optimization skill
    - added Fusion 360 UAV mechanical and aerodynamic design capability
    - expanded modal identification knowledge and added robotics kinematics/dynamics capability
    - added future DOB/LADRC observer weekly plan and motor/gimbal failure-analysis skills
    - added learned Implicit-SVSDF-Planner front-end topic and SVSDF-aware A* implementation skill
    - added learned robust frequency-domain optimization topic and connected it to motor-control implementation
    - updated learned statuses for SVSDF, LADRC, and gimbal disturbance rejection
    - removed outdated March-April 2026 plan file after completion
    - retained MATLAB demo structure and optimization-method extensions
    - restored plan folder as a permanent home for short-term and long-term plans

